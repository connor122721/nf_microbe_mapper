report_comment: >
  This report aggregates QC and mapping statistics for the
  <code>pb-hifi-mapping-nf</code> pipeline.

report_section_order:
  software_versions:
    order: -1000
  fastqc:
    order: -2000
  samtools-flagstat:
    order: -3000
  samtools-stats:
    order: -3100
  kraken:
    order: -4000

export_plots: true

custom_data:
  pipeline:
    file_format: "tsv"
    section_name: "Pipeline"
    plot_type: "table"

# Show top 10 hits for kraken / bracken
top_modules:
  - "fastqc"
  - "samtools"
  - "kraken"
